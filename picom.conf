# Recommended backend for performance
backend = "glx";
vsync = true;

#################################
#
#   FADING
#   Choose ONE of the options below
#
#################################

# Option A: Disable fading completely for max speed
fading = false;

# Option B: Make fading very fast (uncomment these two lines)
# fade-in-step = 0.5;
# fade-out-step = 0.5;

# Option C: Disable fading only for open/close (uncomment this line)
# no-fading-openclose = true;
